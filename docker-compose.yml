services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kebo-app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/user-web/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    depends_on:
      api:
        condition: service_started
      mysql:
        condition: service_healthy

  api:
    image: node:20-alpine
    container_name: kebo-api
    working_dir: /app
    command: sh -c "npm install && npm run prisma:generate --workspace @kebo/api && npm run dev:api"
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
    environment:
      API_PORT: ${API_PORT:-4000}
      JWT_SECRET: ${JWT_SECRET:-kebo-dev-secret}
      DATABASE_URL: mysql://${MYSQL_USER:-kebo}:${MYSQL_PASSWORD:-kebo1234}@mysql:3306/${MYSQL_DATABASE:-kebo}
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: kebo-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kebo}
      MYSQL_USER: ${MYSQL_USER:-kebo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kebo1234}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
    command:
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docs/mysql-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql-data:
